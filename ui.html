    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>ZION PLAY | Cloud OS</title>
        <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
        <script src="https://unpkg.com/lucide@latest"></script>
        <style>
            :root {
                --purple: #bc13fe;
                --blue: #00d2ff;
                --green: #00ff88;
                --red: #ff4b2b;
                --bg: #010103;
                --glass: rgba(10, 10, 15, 0.9);
                --border: rgba(255, 255, 255, 0.1);
                --round: 35px;
            }

            * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; -webkit-tap-highlight-color: transparent; }
            ::-webkit-scrollbar { width: 6px; height: 4px; }
            ::-webkit-scrollbar-thumb { background: linear-gradient(var(--purple), var(--blue)); border-radius: 10px; }

            body { background: var(--bg); color: #fff; font-family: 'Comfortaa', cursive; overflow: hidden; height: 100vh; width: 100vw; }

            #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; pointer-events: none; }
            #gaming-bg {
                position: fixed;
                inset: 0; z-index: -2;
                background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.98)), 
                            url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
                background-size: cover; background-position: center;
                opacity: 0; transition: opacity 1.5s ease;
            }
            .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, black 150%); z-index: -1; pointer-events: none; }

            /* --- AUTH PAGES --- */
            #landing-page, #signup-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; z-index: 1000; position: relative; padding: 20px; animation: fadeIn 0.5s ease; }
            #signup-page { display: none; }

            .auth-card { background: var(--glass); border: 2.5px solid var(--purple); padding: clamp(20px, 5vw, 40px); width: 90%; max-width: 440px; text-align: center; border-radius: 40px; backdrop-filter: blur(25px); box-shadow: 0 0 60px rgba(188, 19, 254, 0.25); transition: 0.4s; }
            .auth-card.admin-mode { border-color: #facc15; box-shadow: 0 0 60px rgba(250, 204, 21, 0.2); }

            input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: var(--blue); border-radius: 15px; margin-bottom: 12px; font-family: 'Comfortaa'; outline: none; transition: 0.3s; font-weight: 700; font-size: 14px; }
            .btn-zion { width: 100%; padding: 16px; border: none; border-radius: 20px; background: linear-gradient(90deg, var(--purple), var(--blue)); color: white; font-weight: 700; cursor: pointer; font-family: 'Comfortaa'; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; margin-bottom: 10px; }
            .btn-outline { background: transparent; border: 1px solid var(--border); color: #888; }

            /* --- DASHBOARD --- */
            #dashboard-wrapper { display: none; height: 100vh; flex-direction: column; }
            .top-nav { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--glass); border: 1px solid var(--border); padding: 8px 20px; border-radius: 100px; display: flex; gap: 15px; z-index: 2000; backdrop-filter: blur(25px); max-width: 90vw; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
            .top-nav::-webkit-scrollbar { display: none; }
            .nav-link { font-size: 0.75rem; color: #666; cursor: pointer; font-weight: 700; transition: 0.3s; text-transform: uppercase; padding: 5px 10px; }
            .nav-link.active { color: #fff; text-shadow: 0 0 10px #fff; }
            
            .top-right { 
                position: fixed; 
                bottom: 25px; 
                right: 20px; 
                z-index: 1500; 
                display: flex; 
                flex-direction: row; 
                align-items: center; 
                gap: 12px; 
                background: rgba(0,0,0,0.6); 
                padding: 10px 15px; 
                border-radius: 25px; 
                border: 1px solid var(--border); 
                backdrop-filter: blur(15px);
            }
            .stat-pill { background: rgba(0,0,0,0.8); border: 1px solid var(--blue); padding: 8px 15px; border-radius: 50px; font-size: 0.75rem; color: var(--blue); font-weight: 700; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--blue); }

            #main-content { display: grid; grid-template-columns: 1fr 350px; padding: 100px 40px 40px 40px; gap: 30px; height: 100vh; overflow: hidden; }
            .section { display: none; height: 100%; overflow-y: auto; padding-right: 10px; animation: slideUp 0.5s ease forwards; }
            .section.active { display: block; }

            .hero-title { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 900; line-height: 0.85; text-transform: uppercase; margin-bottom: 25px; }
            .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding-bottom: 100px; }
            
            .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 25px; padding: 15px; position: relative; transition: 0.4s; cursor: pointer; backdrop-filter: blur(10px); }
            .card:hover { border-color: var(--purple); transform: translateY(-5px); background: rgba(188, 19, 254, 0.05); }
            .card-img { width: 100%; height: clamp(120px, 20vh, 160px); object-fit: cover; border-radius: 15px; opacity: 0.8; margin-bottom: 12px; }
            .card h4 { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            
            .time-badge { font-size: 0.65rem; font-weight: 700; color: var(--blue); letter-spacing: 1px; display: block; margin-top: 5px; opacity: 0.7; }
            .price-tag { color: var(--green); font-weight: 700; font-size: 1.1rem; margin-top: 8px; display: block; }

            .side-card { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 20px; margin-bottom: 15px; position: relative; }
            .side-tag { color: #555; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }

            #admin-inspector { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: #050508; border-left: 3px solid #facc15; z-index: 6000; padding: 30px; transition: 0.5s ease; overflow-y: auto; }
            #admin-inspector.open { right: 0; }
            .edit-pen { position: absolute; top: 10px; right: 10px; background: #facc15; color: #000; padding: 6px; border-radius: 50%; display: none; z-index: 100; cursor: pointer; border: none; }
            .ins-tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #111; padding: 5px; border-radius: 50px; overflow-x: auto; }
            .ins-tab { flex: 1; padding: 10px; border-radius: 50px; border: none; background: transparent; color: #555; font-size: 0.6rem; font-weight: 700; font-family: 'Comfortaa'; cursor: pointer; white-space: nowrap; }
            .ins-tab.active { background: #facc15; color: #000; }

            #universal-portal { position: fixed; inset: 0; z-index: 5000; display: none; background: #000; flex-direction: column; justify-content: flex-end; padding: clamp(20px, 8vw, 80px); animation: portalFade 0.4s ease; overflow-y: auto; }
            #portal-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: -1; filter: blur(8px); }
            #portal-title { font-size: clamp(2.5rem, 10vw, 5rem); }

            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes portalFade { from { opacity: 0; } to { opacity: 1; } }

            @media (max-width: 900px) {
                #main-content { grid-template-columns: 1fr; padding: 120px 20px 20px 20px; }
                #sidebar-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
                .side-card { min-width: 200px; margin-bottom: 0; flex-shrink: 0; padding: 15px; }
                .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
                .hero-title { text-align: center; }
                .top-right { bottom: 20px; right: 10px; transform: scale(0.9); }
            }
        </style>
    </head>
    <body>

        <div id="gaming-bg"></div>
        <canvas id="bg-canvas"></canvas>
        <div class="vignette"></div>

        <section id="landing-page">
            <div class="auth-card" id="main-auth-card">
                <img src="https://i.ibb.co/fdzh7dGT/image-8779a3.jpg" width="100" style="margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--purple));">
                <h2 id="auth-label" style="margin-bottom: 20px; font-size: 0.7rem; letter-spacing: 2px; color: #666;">ZION_OS_AUTHENTICATION</h2>
                <input type="text" id="uid" placeholder="EMAIL">
                <input type="password" id="ups" placeholder="PASSWORD">
                <button class="btn-zion" onclick="processAuth('login')">LOGIN</button>
                <button class="btn-zion btn-outline" onclick="goToSignup()">CREATE ACCOUNT</button>
            </div>
        </section>

        <section id="signup-page">
            <div class="auth-card">
                <h2 style="margin-bottom: 25px; font-size: 1rem; color: var(--blue);">NEW_IDENTITY_REGISTRATION</h2>
                <input type="text" id="new-uid" placeholder="EMAIL">
                <input type="password" id="new-ups" placeholder="PASSWORD">
                <button class="btn-zion" onclick="processAuth('signup')">CREATE ACCOUNT</button>
                <button class="btn-zion btn-outline" onclick="goToLogin()">BACK TO LOGIN</button>
            </div>
        </section>

        <div id="dashboard-wrapper">
            <nav class="top-nav" id="pill-nav"></nav>
            
            <div class="top-right">
                <div class="stat-pill"><i data-lucide="zap" size="12"></i> <span id="pts-box">0</span> PTS</div>
                <div class="stat-pill"><i data-lucide="clock" size="12"></i> <span id="hrs-box">0</span> HRS</div>
                <button class="btn-zion" onclick="logoutUser()" style="width: auto; margin: 0; padding: 10px 15px; background: var(--red); border-radius: 50px; font-size: 0.65rem;">
                    <i data-lucide="log-out" size="12"></i> LOGOUT
                </button>
            </div>

            <main id="main-content">
                <div id="view-port" style="height:100%; overflow:hidden;"></div>
                <aside id="sidebar-container"></aside>
            </main>
        </div>

        <div id="universal-portal">
            <img id="portal-media" src="">
            <div style="z-index: 10; max-width: 800px; width: 100%;">
                <h1 id="portal-title" style="font-weight: 900; line-height:1; text-transform: uppercase;"></h1>
                <p id="portal-desc" style="font-size: clamp(0.9rem, 2vw, 1.1rem); line-height: 1.6; color: #ccc; margin: 25px 0 35px 0;"></p>
                <div class="portal-btns" style="display: flex; gap: 15px;">
                    <button class="btn-zion" id="portal-action-btn" style="width: 250px;"></button>
                    <button class="btn-zion" style="width: 150px; background: rgba(255,255,255,0.1); color: #fff;" onclick="closePortal()">BACK</button>
                </div>
            </div>
        </div>

        <div id="admin-inspector">
            <h2 style="color: #facc15; margin-bottom: 20px; font-size: 1rem;">SYSTEM_CORE_INSPECTOR</h2>
            <div class="ins-tabs">
                <button class="ins-tab active" id="tab-btn-edit" onclick="switchIns('edit')">EDIT</button>
                <button class="ins-tab" id="tab-btn-add-item" onclick="switchIns('add-item')">ITEM+</button>
                <button class="ins-tab" id="tab-btn-add-tab" onclick="switchIns('add-tab')">TAB+</button>
                <button class="ins-tab" id="tab-btn-delete" onclick="switchIns('delete')">DELETE</button>
            </div>

            <div id="ins-body"></div>
            <button class="btn-zion" id="admin-apply-btn" style="background: #facc15; color: #000; margin-top: 20px;" onclick="applyAdminAction()">APPLY UPDATES</button>
            <button class="btn-zion" style="background: #222; margin-top: 10px;" onclick="toggleInspector()">EXIT</button>
        </div>

        <div id="admin-panel" style="display:none; position:fixed; bottom:20px; left:20px; background:#000; border:2px solid #facc15; padding:15px; border-radius:15px; z-index:9999; width:250px;">

        <h3 style="color:#facc15;">ADMIN PANEL</h3>

        <!-- 📊 ANALYTICS BUTTONS -->
        <button onclick="loadStats('daily')" style="width:100%;margin-bottom:5px;">Today</button>
        <button onclick="loadStats('7d')" style="width:100%;margin-bottom:5px;">7 Days</button>
        <button onclick="loadStats('30d')" style="width:100%;margin-bottom:5px;">30 Days</button>
        <button onclick="loadStats('3m')" style="width:100%;margin-bottom:5px;">3 Months</button>
        <button onclick="loadStats('6m')" style="width:100%;margin-bottom:5px;">6 Months</button>
        <button onclick="loadStats('12m')" style="width:100%;margin-bottom:5px;">12 Months</button>

        <!-- 👤 ADMIN INPUTS -->
        <input id="admin-email" placeholder="User Email" style="width:100%;margin-top:10px;margin-bottom:10px;">
        <input id="admin-hrs" placeholder="Add Hours" type="number" style="width:100%;margin-bottom:10px;">
        <input id="admin-pts" placeholder="Add Points" type="number" style="width:100%;margin-bottom:10px;">

        <!-- ➕ ADD TIME -->
        <button onclick="adminAddTime()" style="width:100%;background:#facc15;color:#000;padding:10px;border:none;border-radius:10px;">
            ADD TIME
        </button>

        <!-- 📊 RESULT BOX -->
        <div id="stats-box" style="margin-top:10px;color:#00d2ff;font-size:12px;"></div>

    </div>

        <script>
            window.__ZION_CONFIG = window.__ZION_CONFIG || {
                BACKEND_URL: "",
                STREAM_BASE_URL: ""
            };
        </script>
        <script src="./ui.js"></script>
    <div id="custom-popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); z-index:99999; align-items:center; justify-content:center;">
            <div style="background:rgba(10,10,15,0.95); border:2px solid #facc15; padding:30px; border-radius:25px; width:90%; max-width:400px; text-align:center;">
                <h2 id="popup-title" style="color:#facc15;">NOTICE</h2>
                <p id="popup-msg" style="color:#ccc; margin:20px 0;">Message here</p>
                <button onclick="closePopup()" class="btn-zion">OK</button>
            </div>
        </div>
    </body>
    </html>
