<!DOCTYPE html>
<html>
<head>
  <title>Viewer</title>
</head>

<body style="margin:0;background:black;overflow:hidden;">

<video id="video" autoplay playsinline muted style="width:100vw;height:100vh;"></video>

<script>
const query = new URLSearchParams(location.search);
const sessionId = query.get("session");
const wsOverride = query.get("ws");
const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
const wsUrl = wsOverride || `${wsProtocol}://${location.host}`;

if (!sessionId) {
  alert("Missing session id");
}

const ws = new WebSocket(wsUrl);
const video = document.getElementById("video");

const pc = new RTCPeerConnection({
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
});

ws.onopen = () => {
  ws.send(JSON.stringify({ type: "join-viewer", sessionId }));
};

pc.ontrack = (e) => {
  video.srcObject = e.streams[0];
  video.onloadedmetadata = () => video.play();
};

pc.onicecandidate = (e) => {
  if (e.candidate) {
    ws.send(JSON.stringify({
      type: "ice-candidate",
      candidate: e.candidate,
      sessionId,
      from: "viewer"
    }));
  }
};

ws.onmessage = async (msg) => {
  const data = JSON.parse(msg.data);

  if (data.type === "offer") {
    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    ws.send(JSON.stringify({
      type: "answer",
      answer,
      sessionId,
      from: "viewer"
    }));
  }

  if (data.type === "ice-candidate") {
    try {
      await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    } catch {}
  }
};

function send(data) {
  if (ws.readyState === 1) {
    ws.send(JSON.stringify(data));
  }
}

video.addEventListener("click", () => {
  video.requestPointerLock();
});

document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement === video) {
    send({
      type: "input",
      event: "mousemove",
      x: e.movementX,
      y: e.movementY,
      relative: true
    });
  }
});

document.addEventListener("mousedown", () => {
  if (document.pointerLockElement === video) {
    send({ type: "input", event: "mousedown" });
  }
});

document.addEventListener("mouseup", () => {
  if (document.pointerLockElement === video) {
    send({ type: "input", event: "mouseup" });
  }
});

const pressedKeys = new Set();

document.addEventListener("keydown", (e) => {
  if (pressedKeys.has(e.key)) return;

  pressedKeys.add(e.key);

  send({
    type: "input",
    event: "keydown",
    key: e.key
  });
});

document.addEventListener("keyup", (e) => {
  pressedKeys.delete(e.key);

  send({
    type: "input",
    event: "keyup",
    key: e.key
  });
});
</script>

</body>
</html>
