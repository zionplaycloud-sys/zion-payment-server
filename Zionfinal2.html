<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZION PLAY | Cloud OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --purple: #bc13fe;
            --blue: #00d2ff;
            --green: #00ff88;
            --red: #ff4b2b;
            --bg: #010103;
            --glass: rgba(10, 10, 15, 0.9);
            --border: rgba(255, 255, 255, 0.1);
            --round: 35px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(var(--purple), var(--blue)); border-radius: 10px; }

        body { background: var(--bg); color: #fff; font-family: 'Comfortaa', cursive; overflow: hidden; height: 100vh; width: 100vw; }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; pointer-events: none; }
        #gaming-bg {
            position: fixed;
            inset: 0; z-index: -2;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.98)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1920');
            background-size: cover; background-position: center;
            opacity: 0; transition: opacity 1.5s ease;
        }
        .vignette { position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, black 150%); z-index: -1; pointer-events: none; }

        /* --- AUTH PAGES --- */
        #landing-page, #signup-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; z-index: 1000; position: relative; padding: 20px; animation: fadeIn 0.5s ease; }
        #signup-page { display: none; }

        .auth-card { background: var(--glass); border: 2.5px solid var(--purple); padding: clamp(20px, 5vw, 40px); width: 90%; max-width: 440px; text-align: center; border-radius: 40px; backdrop-filter: blur(25px); box-shadow: 0 0 60px rgba(188, 19, 254, 0.25); transition: 0.4s; }
        .auth-card.admin-mode { border-color: #facc15; box-shadow: 0 0 60px rgba(250, 204, 21, 0.2); }

        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: var(--blue); border-radius: 15px; margin-bottom: 12px; font-family: 'Comfortaa'; outline: none; transition: 0.3s; font-weight: 700; font-size: 14px; }
        .btn-zion { width: 100%; padding: 16px; border: none; border-radius: 20px; background: linear-gradient(90deg, var(--purple), var(--blue)); color: white; font-weight: 700; cursor: pointer; font-family: 'Comfortaa'; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; margin-bottom: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #888; }

        /* --- DASHBOARD --- */
        #dashboard-wrapper { display: none; height: 100vh; flex-direction: column; }
        .top-nav { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--glass); border: 1px solid var(--border); padding: 8px 20px; border-radius: 100px; display: flex; gap: 15px; z-index: 2000; backdrop-filter: blur(25px); max-width: 90vw; overflow-x: auto; white-space: nowrap; -ms-overflow-style: none; scrollbar-width: none; }
        .top-nav::-webkit-scrollbar { display: none; }
        .nav-link { font-size: 0.75rem; color: #666; cursor: pointer; font-weight: 700; transition: 0.3s; text-transform: uppercase; padding: 5px 10px; }
        .nav-link.active { color: #fff; text-shadow: 0 0 10px #fff; }
        
        .top-right { 
            position: fixed; 
            bottom: 25px; 
            right: 20px; 
            z-index: 1500; 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            gap: 12px; 
            background: rgba(0,0,0,0.6); 
            padding: 10px 15px; 
            border-radius: 25px; 
            border: 1px solid var(--border); 
            backdrop-filter: blur(15px);
        }
        .stat-pill { background: rgba(0,0,0,0.8); border: 1px solid var(--blue); padding: 8px 15px; border-radius: 50px; font-size: 0.75rem; color: var(--blue); font-weight: 700; display: flex; align-items: center; gap: 8px; border-left: 4px solid var(--blue); }

        #main-content { display: grid; grid-template-columns: 1fr 350px; padding: 100px 40px 40px 40px; gap: 30px; height: 100vh; overflow: hidden; }
        .section { display: none; height: 100%; overflow-y: auto; padding-right: 10px; animation: slideUp 0.5s ease forwards; }
        .section.active { display: block; }

        .hero-title { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 900; line-height: 0.85; text-transform: uppercase; margin-bottom: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; padding-bottom: 100px; }
        
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 25px; padding: 15px; position: relative; transition: 0.4s; cursor: pointer; backdrop-filter: blur(10px); }
        .card:hover { border-color: var(--purple); transform: translateY(-5px); background: rgba(188, 19, 254, 0.05); }
        .card-img { width: 100%; height: clamp(120px, 20vh, 160px); object-fit: cover; border-radius: 15px; opacity: 0.8; margin-bottom: 12px; }
        .card h4 { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .time-badge { font-size: 0.65rem; font-weight: 700; color: var(--blue); letter-spacing: 1px; display: block; margin-top: 5px; opacity: 0.7; }
        .price-tag { color: var(--green); font-weight: 700; font-size: 1.1rem; margin-top: 8px; display: block; }

        .side-card { background: var(--glass); border: 1px solid var(--border); border-radius: 25px; padding: 20px; margin-bottom: 15px; position: relative; }
        .side-tag { color: #555; font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 5px; }

        #admin-inspector { position: fixed; top: 0; right: -100%; width: 100%; max-width: 400px; height: 100vh; background: #050508; border-left: 3px solid #facc15; z-index: 6000; padding: 30px; transition: 0.5s ease; overflow-y: auto; }
        #admin-inspector.open { right: 0; }
        .edit-pen { position: absolute; top: 10px; right: 10px; background: #facc15; color: #000; padding: 6px; border-radius: 50%; display: none; z-index: 100; cursor: pointer; border: none; }
        .ins-tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #111; padding: 5px; border-radius: 50px; overflow-x: auto; }
        .ins-tab { flex: 1; padding: 10px; border-radius: 50px; border: none; background: transparent; color: #555; font-size: 0.6rem; font-weight: 700; font-family: 'Comfortaa'; cursor: pointer; white-space: nowrap; }
        .ins-tab.active { background: #facc15; color: #000; }

        #universal-portal { position: fixed; inset: 0; z-index: 5000; display: none; background: #000; flex-direction: column; justify-content: flex-end; padding: clamp(20px, 8vw, 80px); animation: portalFade 0.4s ease; overflow-y: auto; }
        #portal-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: -1; filter: blur(8px); }
        #portal-title { font-size: clamp(2.5rem, 10vw, 5rem); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes portalFade { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 900px) {
            #main-content { grid-template-columns: 1fr; padding: 120px 20px 20px 20px; }
            #sidebar-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
            .side-card { min-width: 200px; margin-bottom: 0; flex-shrink: 0; padding: 15px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
            .hero-title { text-align: center; }
            .top-right { bottom: 20px; right: 10px; transform: scale(0.9); }
        }
    </style>
</head>
<body>

    <div id="gaming-bg"></div>
    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>

    <section id="landing-page">
        <div class="auth-card" id="main-auth-card">
            <img src="https://i.ibb.co/fdzh7dGT/image-8779a3.jpg" width="100" style="margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--purple));">
            <h2 id="auth-label" style="margin-bottom: 20px; font-size: 0.7rem; letter-spacing: 2px; color: #666;">ZION_OS_AUTHENTICATION</h2>
            <input type="text" id="uid" placeholder="EMAIL">
            <input type="password" id="ups" placeholder="PASSWORD">

            <button class="btn-zion btn-outline" onclick="goToSignup()">CREATE ACCOUNT</button>
        </div>
    </section>

    <section id="signup-page">
        <div class="auth-card">
            <h2 style="margin-bottom: 25px; font-size: 1rem; color: var(--blue);">NEW_IDENTITY_REGISTRATION</h2>
            <input type="text" id="new-uid" placeholder="EMAIL">
            <input type="password" id="new-ups" placeholder="PASSWORD">
            <button class="btn-zion" onclick="processAuth('signup')">CREATE ACCOUNT</button>
            <button class="btn-zion btn-outline" onclick="goToLogin()">BACK TO LOGIN</button>
        </div>
    </section>

    <div id="dashboard-wrapper">
        <nav class="top-nav" id="pill-nav"></nav>
        
        <div class="top-right">
            <div class="stat-pill"><i data-lucide="zap" size="12"></i> <span id="pts-box">0</span> PTS</div>
            <div class="stat-pill"><i data-lucide="clock" size="12"></i> <span id="hrs-box">0</span> HRS</div>
            <button class="btn-zion" onclick="logoutUser()" style="width: auto; margin: 0; padding: 10px 15px; background: var(--red); border-radius: 50px; font-size: 0.65rem;">
                <i data-lucide="log-out" size="12"></i> LOGOUT
            </button>
        </div>

        <main id="main-content">
            <div id="view-port" style="height:100%; overflow:hidden;"></div>
            <aside id="sidebar-container"></aside>
        </main>
    </div>

    <div id="universal-portal">
        <img id="portal-media" src="">
        <div style="z-index: 10; max-width: 800px; width: 100%;">
            <h1 id="portal-title" style="font-weight: 900; line-height:1; text-transform: uppercase;"></h1>
            <p id="portal-desc" style="font-size: clamp(0.9rem, 2vw, 1.1rem); line-height: 1.6; color: #ccc; margin: 25px 0 35px 0;"></p>
            <div class="portal-btns" style="display: flex; gap: 15px;">
                <button class="btn-zion" id="portal-action-btn" style="width: 250px;"></button>
                <button class="btn-zion" style="width: 150px; background: rgba(255,255,255,0.1); color: #fff;" onclick="closePortal()">BACK</button>
            </div>
        </div>
    </div>

    <div id="admin-inspector">
        <h2 style="color: #facc15; margin-bottom: 20px; font-size: 1rem;">SYSTEM_CORE_INSPECTOR</h2>
        <div class="ins-tabs">
            <button class="ins-tab active" id="tab-btn-edit" onclick="switchIns('edit')">EDIT</button>
            <button class="ins-tab" id="tab-btn-add-item" onclick="switchIns('add-item')">ITEM+</button>
            <button class="ins-tab" id="tab-btn-add-tab" onclick="switchIns('add-tab')">TAB+</button>
            <button class="ins-tab" id="tab-btn-delete" onclick="switchIns('delete')">DELETE</button>
        </div>

        <div id="ins-body"></div>
        <button class="btn-zion" id="admin-apply-btn" style="background: #facc15; color: #000; margin-top: 20px;" onclick="applyAdminAction()">APPLY UPDATES</button>
        <button class="btn-zion" style="background: #222; margin-top: 10px;" onclick="toggleInspector()">EXIT</button>
    </div>

    <div id="admin-panel" style="display:none; position:fixed; bottom:20px; left:20px; background:#000; border:2px solid #facc15; padding:15px; border-radius:15px; z-index:9999; width:250px;">

    <h3 style="color:#facc15;">ADMIN PANEL</h3>

    <!-- 📊 ANALYTICS BUTTONS -->
    <button onclick="loadStats('daily')" style="width:100%;margin-bottom:5px;">Today</button>
    <button onclick="loadStats('7d')" style="width:100%;margin-bottom:5px;">7 Days</button>
    <button onclick="loadStats('30d')" style="width:100%;margin-bottom:5px;">30 Days</button>
    <button onclick="loadStats('3m')" style="width:100%;margin-bottom:5px;">3 Months</button>
    <button onclick="loadStats('6m')" style="width:100%;margin-bottom:5px;">6 Months</button>
    <button onclick="loadStats('12m')" style="width:100%;margin-bottom:5px;">12 Months</button>

    <!-- 👤 ADMIN INPUTS -->
    <input id="admin-email" placeholder="User Email" style="width:100%;margin-top:10px;margin-bottom:10px;">
    <input id="admin-hrs" placeholder="Add Hours" type="number" style="width:100%;margin-bottom:10px;">
    <input id="admin-pts" placeholder="Add Points" type="number" style="width:100%;margin-bottom:10px;">

    <!-- ➕ ADD TIME -->
    <button onclick="adminAddTime()" style="width:100%;background:#facc15;color:#000;padding:10px;border:none;border-radius:10px;">
        ADD TIME
    </button>

    <!-- 📊 RESULT BOX -->
    <div id="stats-box" style="margin-top:10px;color:#00d2ff;font-size:12px;"></div>

</div>

    <script>

        const BACKEND_URL = "https://zion-payment-server-i4ow.onrender.com";

        // ================= ADMIN STATS =================
async function loadStats(range) {
    try {
        const res = await fetch(`${BACKEND_URL}/admin-stats?range=${range}`);
        const data = await res.json();

        if(data.success){
            document.getElementById("stats-box").innerHTML = `
                <div style="background:#111;padding:10px;border-radius:10px;">
                    <div>💰 Revenue: ₹${data.totalRevenue}</div>
                    <div>📦 Orders: ${data.totalOrders}</div>
                    <div>⏱ Hours Sold: ${data.totalHours}</div>
                    <div>⚡ Points: ${data.totalPoints}</div>
                </div>
            `;
        } else {
            document.getElementById("stats-box").innerText = "Failed to load stats";
        }

    } catch(e){
        document.getElementById("stats-box").innerText = "Server error";
    }
}
        // --- 1. NEURAL ENGINE ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let dots = [], mouse = { x: null, y: null };
        window.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
        window.ontouchmove = (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; };
        function initBG() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; dots = []; for(let i=0; i<50; i++) dots.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4, color: Math.random() > 0.5 ? '#bc13fe' : '#00d2ff' }); }
        function drawBG() { ctx.clearRect(0,0,canvas.width, canvas.height); dots.forEach((d, i) => { d.x += d.vx; d.y += d.vy; if(d.x<0 || d.x>canvas.width) d.vx*=-1; if(d.y<0 || d.y>canvas.height) d.vy*=-1; let mDist = Math.hypot(d.x-mouse.x, d.y-mouse.y); if(mDist < 120) { ctx.strokeStyle = d.color; ctx.globalAlpha = 1 - (mDist / 120); ctx.beginPath(); ctx.moveTo(d.x, d.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke(); ctx.globalAlpha = 1; } dots.slice(i+1).forEach(d2 => { if(Math.hypot(d.x-d2.x, d.y-d2.y)<100){ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d2.x,d2.y);ctx.stroke();}}); ctx.fillStyle = d.color; ctx.beginPath(); ctx.arc(d.x, d.y, 1.2, 0, Math.PI*2); ctx.fill(); }); requestAnimationFrame(drawBG); }
        initBG(); drawBG();
        window.onresize = initBG;

        // --- 2. GLOBAL STATE ---
        

        let state = {
            pts: 0, hrs: 0, isCmd: false, activeTab: 'home',
            tabs: ['Home', 'Games', 'Arcade', 'Shop', 'Reward'],
            homeData: {
                heroTitle: "MW III", heroImg: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200",
                offerTitle: "POINTS SYSTEM", offerDesc: "₹100 Spent = 10 Pts | Referral = 20 Pts",
                userLabel: "WELCOME COMMANDER", userLevel: "LEGENDARY"
            },
            content: {
                games: [
                    { id: 'g1', name: "MODERN WARFARE III", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=800", desc: "Elite realistic warfare instance.", exePath: "" },
                    { id: 'g2', name: "FC MOBILE 25", img: "https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=800", desc: "Build your legacy squad.", exePath: "" },
                    { id: 'g3', name: "GHOST OF TSUSHIMA", img: "https://images.unsplash.com/photo-1605898835373-013eb423b0f2?q=80&w=800", desc: "Honor vs Survival.", exePath: "" }
                ],
                arcade: [{ id: 'a1', name: "DHAKA COMMUNITY CUP", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=800", prize: "25k PTS", desc: "Pro Tournament." }],
                shop: [
                    { id: 's1', name: "TRIAL", cost: "49", time: 0.5, bonus: 5, img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800", desc: "30 Mins Access + 5 Pts" },
                    { id: 's2', name: "BASIC", cost: "99", time: 1.0, bonus: 10, img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800", desc: "1 Hour Access + 10 Pts" },
                    { id: 's3', name: "VALUE", cost: "249", time: 3.0, bonus: 30, img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800", desc: "3 Hours Access + 30 Pts" },
                    { id: 's4', name: "POWER", cost: "399", time: 5.0, bonus: 50, img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800", desc: "5 Hours Access + 50 Pts" },
                    { id: 's5', name: "PRO", cost: "699", time: 10.0, bonus: 100, img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800", desc: "10 Hours Access + 100 Pts" },
                    { id: 's6', name: "ELITE", cost: "1199", time: 20.0, bonus: 200, img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=800", desc: "20 Hours Access + 200 Pts + Priority" }
                ],
                reward: [
                    { id: 'r1', name: "REDEEM PLAYTIME", cost: "99", time: 0.5, img: "https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?q=80&w=800", desc: "Redeem 99 Pts for 30 Mins." }
                ]
            }
        };

        // --- PERSISTENCE: Sync State on Load ---
       async function syncStateFromServer() {
    try {
        const res = await fetch(`${BACKEND_URL}/get-system-state`);
        const data = await res.json();

        if(data.success && data.state && currentUserEmail){
            if(data.state[currentUserEmail]){
                state.hrs = data.state[currentUserEmail].timeLeft;
            }
        }

    } catch(e) {
        console.warn("State load failed");
    }
}

        let currentUserEmail = "";
        let timerInterval;
        let insMode = 'edit', editId = '', editList = '';

        function goToSignup() { document.getElementById('landing-page').style.display = 'none'; document.getElementById('signup-page').style.display = 'flex'; }
        function goToLogin() { document.getElementById('signup-page').style.display = 'none'; document.getElementById('landing-page').style.display = 'flex'; }


        async function processAuth(mode) {
            if(mode === 'signup') {
                const email = document.getElementById('new-uid').value;
                const password = document.getElementById('new-ups').value;
                if(!email || !password) return showPopup("ENTER DETAILS");
                try {
                    const res = await fetch(`${BACKEND_URL}/signup`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });
                    const data = await res.json();
                    if(data.success){ showPopup("ACCOUNT CREATED"); goToLogin(); } 
                    else { showPopup("USER EXISTS OR ERROR OCCURRED"); }
                } catch(e) { showPopup("BACKEND OFFLINE"); }
                return;
            }

            const email = document.getElementById('uid').value;
            const password = document.getElementById('ups').value;
            if(!email || !password) return showPopup("CREDENTIALS REQUIRED");


            try {
                const res = await fetch(`${BACKEND_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
               

if(data.success){

    // 👑 ADMIN
    if(data.isAdmin){
        state.isCmd = true;
        enterOS();
        return;
    }

    // 👤 USER
    if((data.hrs || 0) <= 0){
        showPopup("You don't have enough balance.\nContact admin.", "ACCESS DENIED ⚠️");
        return;
    }

    state.isCmd = false;
currentUserEmail = email;
state.pts = data.pts || 0;

// 🔥 FIRST LOAD REAL TIME FROM SESSION
await syncStateFromServer();

// 🔥 NOW CHECK REAL TIME
if((state.hrs || 0) <= 0){
    showPopup("You don't have enough balance.\nContact admin.", "ACCESS DENIED ⚠️");
    return;
}

enterOS();
startTimer();

}
 else {
    showPopup("INVALID LOGIN ❌");
}

} catch(e) {
    showPopup("OFFLINE");
}
}

        function enterOS() {
            document.getElementById('gaming-bg').style.opacity = "1";
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('signup-page').style.display = 'none';
            document.getElementById('dashboard-wrapper').style.display = 'flex';
            renderUI();
            if(state.isCmd){ showAdminPanel(); }
        }

        function renderUI() {
            const pen = state.isCmd ? 'display:block' : 'display:none';
document.getElementById('pts-box').innerText = (state.pts || 0).toLocaleString();            
document.getElementById('hrs-box').innerText = (state.hrs || 0).toFixed(2);
            document.getElementById('pill-nav').innerHTML = state.tabs.map(t => `<div class="nav-link ${state.activeTab === t.toLowerCase() ? 'active' : ''}" onclick="setTab('${t.toLowerCase()}')">${t}</div>`).join('');
            let port = document.getElementById('view-port'), tab = state.activeTab, html = '';
            
            if(tab === 'home') {
                html = `<section class="section active">
                    <div style="position:relative; margin-bottom:30px">
                        <i data-lucide="pencil" class="edit-pen" style="${pen}" onclick="openEdit('heroTitle', 'homeData')"></i>
                        <h1 class="hero-title">${state.homeData.heroTitle}</h1>
                        <button class="btn-zion" style="width:160px; margin: 0 auto;" onclick="openPortal('g1','games')">LAUNCH</button>
                    </div>
                    <div style="position:relative; background:rgba(255,255,255,0.03); border:1px solid var(--border); padding:20px; border-radius:25px; display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
                        <i data-lucide="pencil" class="edit-pen" style="${pen}" onclick="openEdit('offerTitle', 'homeData')"></i>
                        <div style="flex:1; padding-right:10px;"><h2 style="font-weight:700; font-size: 0.9rem">${state.homeData.offerTitle}</h2><p style="color:#666; font-size:0.7rem">${state.homeData.offerDesc}</p></div>
                        <button class="btn-zion" style="width:80px; background:#fff; color:#000; font-size:0.6rem; padding:10px; margin:0" onclick="setTab('reward')">VIEW</button>
                    </div>
                    <h2 style="font-weight:700; margin-bottom:15px; font-size:0.8rem;">// POPULAR</h2>
                    <div class="grid">${state.content.games.map(g => `<div class="card" onclick="openPortal('${g.id}','games')"><img src="${g.img}" class="card-img"><h4>${g.name}</h4><span class="time-badge">OS TIME: ${state.hrs.toFixed(2)} HRS</span></div>`).join('')}</div>
                </section>`;
            } else {
                html = `<section class="section active"><h2>// ${tab.toUpperCase()}</h2><div class="grid" style="margin-top:20px">${(state.content[tab] || []).map(i => `
                    <div class="card" onclick="openPortal('${i.id}', '${tab}')">
                        <i data-lucide="pencil" class="edit-pen" style="${pen}" onclick="event.stopPropagation(); openEdit('${i.id}', '${tab}')"></i>
                        <img src="${i.img || 'https://via.placeholder.com/400'}" class="card-img">
                        <h4>${i.name}</h4>
                        ${tab === 'games' ? `<span class="time-badge">OS TIME: ${state.hrs.toFixed(2)} HRS</span>` : `<p class="price-tag">${tab === 'shop' ? '₹'+i.cost : i.cost + ' PTS'}</p>`}
                    </div>`).join('')}</div></section>`;
            }
            port.innerHTML = html;
            document.getElementById('sidebar-container').innerHTML = `
                <div class="side-card"><i data-lucide="pencil" class="edit-pen" style="${pen}" onclick="openEdit('userLabel', 'homeData')"></i><span class="side-tag">USER</span><h2 style="font-weight:700; font-size:1.1rem">${state.homeData.userLabel}</h2></div>
                <div class="side-card" style="border-left:4px solid var(--purple)"><i data-lucide="pencil" class="edit-pen" style="${pen}" onclick="openEdit('userLevel', 'homeData')"></i><span class="side-tag">LEVEL</span><h2 style="font-weight:700; font-size:1.1rem">${state.homeData.userLevel}</h2></div>`;
            lucide.createIcons();
        }

        // --- REMOTE EXE LAUNCH ---
        async function triggerExeOnHost(path) {
            if(!path) return showPopup("EXE PATH NOT DEFINED", "ERROR ❌");
            try {
                const res = await fetch(`${BACKEND_URL}/launch-exe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: path })
                });
                const data = await res.json();
                if(data.success) showPopup("Game launching on host machine...", "SUCCESS ✅");
                else showPopup("Launch Failed: " + data.error, "ERROR ❌");
            } catch(e) { showPopup("Host Offline: Local launch unavailable.", "ERROR ❌"); }
        }

        function openPortal(id, list) {
            let item = state.content[list].find(x => x.id === id);
            document.getElementById('portal-media').src = item.img;
            document.getElementById('portal-title').innerText = item.name;
            document.getElementById('portal-desc').innerText = item.desc;
            let btn = document.getElementById('portal-action-btn');
            if(list === 'games') btn.innerText = "START SESSION";
            else if(list === 'shop') btn.innerText = "BUY FOR ₹" + item.cost;
            else btn.innerText = "REDEEM FOR " + item.cost + " PTS";
            btn.onclick = async () => {

    // 🔥 SHOP → PAYMENT SYSTEM
 if(list === 'shop') {

    if(!currentUserEmail){
        showPopup("LOGIN REQUIRED ❌");
        return;
    }

    showPopup("Redirecting to payment...", "WAIT ⏳");

    try {
        const res = await fetch(`${BACKEND_URL}/create-order`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: currentUserEmail,
                plan: item.name,
                amount: parseInt(item.cost),
                phone: ""
            })
        });

        const data = await res.json();

        if(data.link){
            // 🔥 IMPORTANT: delay for smooth UX
            setTimeout(() => {
                window.location.href = data.link;
            }, 800);
        } else {
            showPopup("PAYMENT LINK FAILED ❌");
        }

    } catch(e){
        showPopup("SERVER ERROR ❌");
    }

    return;
}
    // 🎁 REWARD SYSTEM (UNCHANGED)
    if(list === 'reward') {
        if(state.pts >= parseInt(item.cost)) {
            state.pts -= parseInt(item.cost);
            state.hrs += parseFloat(item.time);
            showPopup("EXCHANGE SUCCESSFUL!");
        } else {
            showPopup("INSUFFICIENT BALANCE");
        }
    }

    // 🎮 GAME LAUNCH (UNCHANGED)
    else {
        if(item.exePath) triggerExeOnHost(item.exePath);
        else showPopup("Launching Cloud Instance...");
    }

    renderUI();
    closePortal();
};
            document.getElementById('universal-portal').style.display = 'flex';
        }

        function switchIns(m) {
            insMode = m;
            document.querySelectorAll('.ins-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-btn-' + m).classList.add('active');
            let body = document.getElementById('ins-body');
            let apply = document.getElementById('admin-apply-btn');
            apply.style.background = m === 'delete' ? '#ff4b2b' : '#facc15';
            if(m === 'add-tab') body.innerHTML = `<input type="text" id="new-tab-name" placeholder="Tab Name">`;
            else if(m === 'add-item') body.innerHTML = `<select id="add-cat">${state.tabs.filter(t => t !== 'Home').map(t => `<option value="${t.toLowerCase()}">${t}</option>`).join('')}</select>
                <input type="text" id="new-name" placeholder="Name"><input type="text" id="new-img" placeholder="Img URL"><input type="text" id="new-val" placeholder="Value"><input type="text" id="new-exe" placeholder="C:\\Games\\Game.exe (Host Path)"><textarea id="new-desc" placeholder="Desc"></textarea>`;
            else if(m === 'delete') {
                body.innerHTML = `<p style="color:#666; font-size:0.7rem; mb:10px">DELETE TAB:</p><select id="del-tab-select">${state.tabs.filter(t => t !== 'Home').map(t => `<option value="${t}">${t}</option>`).join('')}</select>
                    <p style="color:#666; font-size:0.7rem; mt:15px; mb:10px">DELETE ITEM:</p><select id="del-cat-list" onchange="updateDelItemList()">${state.tabs.filter(t => t !== 'Home').map(t => `<option value="${t.toLowerCase()}">${t}</option>`).join('')}</select><select id="del-item-list" style="margin-top:10px"></select>`;
                updateDelItemList();
            }
            else body.innerHTML = `<p style="color:#666; font-size:0.7rem;">Select a yellow pencil to edit.</p>`;
        }

        function updateDelItemList() { 
            let cat = document.getElementById('del-cat-list').value; 
            let list = document.getElementById('del-item-list');
            list.innerHTML = `<option value="">-- Select Item --</option>` + (state.content[cat] || []).map(i => `<option value="${i.id}">${i.name}</option>`).join('');
        }

        function openEdit(id, list) {
            switchIns('edit');
            editId = id; editList = list;
            let itm = (list === 'homeData') ? { name: state.homeData[id], img: state.homeData.heroImg, desc: state.homeData.offerDesc } : state.content[list].find(x => x.id === id);
            
            // Add EXE Path input specifically for games
            let exeInput = (list === 'games') ? `<input type="text" id="edit-exe" value="${itm.exePath || ''}" placeholder="C:\\Path\\To\\Game.exe">` : '';

            document.getElementById('ins-body').innerHTML = `
                <input type="text" id="edit-n" value="${itm.name || itm}" placeholder="Title">
                <input type="text" id="edit-s" value="${itm.img || itm.cost || ''}" placeholder="URL/Value">
                ${exeInput}
                <textarea id="edit-d" placeholder="Desc" rows="4">${itm.desc || ''}</textarea>
            `;
            toggleInspector();
        }

        async function applyAdminAction() {
            if(insMode === 'add-tab') { let n = document.getElementById('new-tab-name').value; if(n && !state.tabs.includes(n)){ state.tabs.push(n); state.content[n.toLowerCase()] = []; } }
            else if(insMode === 'add-item') { 
                let cat = document.getElementById('add-cat').value; 
                let newItem = { id: Date.now().toString(), name: document.getElementById('new-name').value, img: document.getElementById('new-img').value, desc: document.getElementById('new-desc').value, cost: document.getElementById('new-val').value, exePath: document.getElementById('new-exe').value, time: 1, bonus: 10 }; 
                state.content[cat].push(newItem); 
            }
            else if(insMode === 'edit') { 
                let n = document.getElementById('edit-n').value, s = document.getElementById('edit-s').value, d = document.getElementById('edit-d').value;
                if(editList === 'homeData') { state.homeData[editId] = n; if(editId === 'heroTitle') state.homeData.heroImg = s; if(editId === 'offerTitle') state.homeData.offerDesc = d; }
                else { 
                    let itm = state.content[editList].find(x => x.id === editId); 
                    itm.name = n; itm.desc = d; 
                    if(itm.img !== undefined) itm.img = s; else itm.cost = s; 
                    if(editList === 'games') itm.exePath = document.getElementById('edit-exe').value;
                }
            }
            else if(insMode === 'delete') {
                let tabToDel = document.getElementById('del-tab-select').value;
                let itemToDelId = document.getElementById('del-item-list').value;
                let catOfItem = document.getElementById('del-cat-list').value;
                if(itemToDelId) state.content[catOfItem] = state.content[catOfItem].filter(i => i.id !== itemToDelId);
                else if(tabToDel) { state.tabs = state.tabs.filter(t => t !== tabToDel); delete state.content[tabToDel.toLowerCase()]; if(state.activeTab === tabToDel.toLowerCase()) state.activeTab = 'home'; }
            }

            // --- SAVE UPDATED STATE TO SERVER (FIXES REFRESH ISSUE) ---
            try {
                await fetch(`${BACKEND_URL}/update-system-state`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        state: {
            [currentUserEmail]: {
                timeLeft: state.hrs
            }
        }
    })
});
                showPopup("Global Update Successful", "SUCCESS ✅");
            } catch(e) { console.log("Backend offline, updating local state only."); }

            renderUI();
            toggleInspector();
        }

        function toggleInspector() { document.getElementById('admin-inspector').classList.toggle('open'); }
        function closePortal() { document.getElementById('universal-portal').style.display = 'none'; }
        function setTab(t) { state.activeTab = t; renderUI(); }
        function showAdminPanel(){ document.getElementById('admin-panel').style.display = 'block'; }

        function showPopup(message, title = "NOTICE"){
            const titleEl = document.getElementById('popup-title');
            titleEl.innerText = title;
            if(title.includes("SUCCESS")) titleEl.style.color = "#00ff88";
            else if(title.includes("ERROR")) titleEl.style.color = "#ff4b2b";
            else if(title.includes("ACCESS")) titleEl.style.color = "#facc15";
            else titleEl.style.color = "#00d2ff";
            document.getElementById('popup-msg').innerText = message;
            document.getElementById('custom-popup').style.display = 'flex';
        }
        function closePopup(){ document.getElementById('custom-popup').style.display = 'none'; }

   function startTimer(){
    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{
        if(state.hrs > 0){

            state.hrs = Math.max(0, state.hrs - 0.01);

            // 🔥 ONLY SAVE TO SESSION (NO update-time anymore)
            fetch(`${BACKEND_URL}/update-system-state`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    state: {
                        [currentUserEmail]: {
                            timeLeft: state.hrs
                        }
                    }
                })
            });

            // ⏰ TIME OVER
            if(state.hrs <= 0){
                state.hrs = 0;
                clearInterval(timerInterval);
                showPopup("Contact admin to continue", "TIME OVER ⚠️");
                setTimeout(()=>{ logoutUser(); }, 2000);
            }

            renderUI(); 
        }

    }, 60000);
}

        function logoutUser(){
            clearInterval(timerInterval);
            document.getElementById('dashboard-wrapper').style.display = 'none';
            document.getElementById('landing-page').style.display = 'flex';
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('gaming-bg').style.opacity = "0";
            document.getElementById('uid').value = "";
            document.getElementById('ups').value = "";
            state.hrs = 0;
            state.pts = 0;
            currentUserEmail = "";
        }

        document.getElementById('admin-email').addEventListener('input', async (e) => {
            const email = e.target.value;
            if (email.length > 5) {
                try {
                    const res = await fetch(`${BACKEND_URL}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, password: "FETCH_ONLY" }) 
                    });
                    const data = await res.json();
                    if (data.success) {
                        document.getElementById('admin-hrs').placeholder = "Current: " + (data.hrs || 0);
                        document.getElementById('admin-pts').placeholder = "Current: " + (data.pts || 0);
                    }
                } catch (e) {}
            }
        });

        async function adminAddTime(){
            const email = document.getElementById('admin-email').value;
            const addHrs = parseFloat(document.getElementById('admin-hrs').value) || 0;
            const addPts = parseInt(document.getElementById('admin-pts').value) || 0;
            if(!email) return showPopup("ENTER USER EMAIL");
            try{
                const res = await fetch(`${BACKEND_URL}/admin-add`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({ email, hrs: addHrs, pts: addPts })
                });
                const data = await res.json();
                if(data.success){

// 🔥 ALSO UPDATE SESSION
await fetch(`${BACKEND_URL}/update-system-state`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
        state: {
            [email]: {
                timeLeft: state.hrs + addHrs
            }
        }
    })
});                    showPopup(`Added ${addHrs} hrs & ${addPts} pts to ${email}`, "SUCCESS ✅");
                    if(email === currentUserEmail){ state.hrs += addHrs; state.pts += addPts; renderUI(); }
                    document.getElementById('admin-hrs').value = "";
                    document.getElementById('admin-pts').value = "";
                } else { showPopup("Failed ❌ Check email existence."); }
            } catch(e){ showPopup("Server Error ❌"); }
        }


    </script>

    <div id="custom-popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(10px); z-index:99999; align-items:center; justify-content:center;">
        <div style="background:rgba(10,10,15,0.95); border:2px solid #facc15; padding:30px; border-radius:25px; width:90%; max-width:400px; text-align:center;">
            <h2 id="popup-title" style="color:#facc15;">NOTICE</h2>
            <p id="popup-msg" style="color:#ccc; margin:20px 0;">Message here</p>
            <button onclick="closePopup()" class="btn-zion">OK</button>
        </div>
    </div>
